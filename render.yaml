services:
  - type: web
    name: portfolio
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_NAME
        value: portfolio
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        value: shivanandgupta316@gmail.com
      - key: CONTACT_EMAIL
        value: shivanandgupta316@gmail.com
